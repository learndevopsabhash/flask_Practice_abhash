name: GitHub Actions CI/CD Pipeline Flask App
on:
  push:
    branches:
      - staging
      - main
    tags:
      - 'v*.*.*'
jobs:
  install-dependencies-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt

      - name: Create .env file
        run: |
          echo "MONGO_URI=${{ secrets.MONGO_URI }}" >> .env
          echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env

      - name: Run unit tests
        run: |
          source .venv/bin/activate
          pytest -v --collect-only

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Download .venv
          path: .venv
          include-hidden-files: true

  deploy-to-staging:
    if: github.ref == 'refs/heads/staging'
    needs: install-dependencies-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: Download .venv
          path: .venv
          include-hidden-files: true

      - name: Set permissions for virtual environment
        run: |  
          chmod -R +x .venv
      - name: Create .env file
        run: |
          echo "MONGO_URI=${{ secrets.MONGO_URI }}" >> .env
          echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env
      - name: Deploy to Staging Server
        run: |
          source .venv/bin/activate
          nohup python app.py &
          sleep 5
          curl -fsS http://localhost:5000

  deploy-to-production:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: install-dependencies-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: SSH into Production Server and Deploy
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.PROD_SERVER_IP }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SERVER_SSH_KEY }}
          script: |
            mkdir -p /app
            cd /app
            git pull origin main
            python -m venv .venv
            source .venv/bin/activate
            pip install -r requirements.txt
            echo "MONGO_URI=${{ secrets.MONGO_URI }}" >> .env
            echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env
            nohup python app.py &
            sleep 60
            curl -fsS http://localhost:5000
