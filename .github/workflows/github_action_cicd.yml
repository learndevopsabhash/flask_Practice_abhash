name: GitHub Actions CI/CD Pipeline Flask App
on:
  push:
    branches:
      - staging
      - main
    tags:
      - 'v*.*.*'
jobs:
  install-dependencies-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt

      - name: Create .env file
        run: |
          echo "MONGO_URI=${{ secrets.MONGO_URI }}" >> .env
          echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env

      - name: Run unit tests
        run: |
          source .venv/bin/activate
          pytest -v

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Download .venv
          path: .venv
          include-hidden-files: true

  deploy-to-staging:
    if: github.ref == 'refs/heads/staging'
    needs: install-dependencies-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: Download .venv
          path: .venv
          include-hidden-files: true

      - name: Set permissions for virtual environment
        run: |  
          chmod -R +x .venv
      - name: Create .env file
        run: |
          echo "MONGO_URI=${{ secrets.MONGO_URI }}" >> .env
          echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env
      - name: Deploy to Staging Server
        run: |
          source .venv/bin/activate
          nohup python app.py &
          sleep 5
          curl -fsS http://localhost:5000

  deploy-to-production:
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
    needs: install-dependencies-and-test
    runs-on: ubuntu-latest
    steps:
      - name: setup ssh agent
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.PROD_SERVER_SSH_KEY }}
      
      - name: deploy to my ec2 and run the flask app
        run: |
          ssh -o "strictHostKeyChecking=no" ${{ secrets.PROD_SERVER_USER }}@${{ secrets.PROD_SERVER_IP }} << 'EOF'
            if [ ! -d flask_Practice_abhash ]; then
              git clone https://github.com/learndevopsabhash/flask_Practice_abhash.git
            fi
            cd flask_Practice_abhash
            git pull origin main
            cat > .env << EOF
            MONGO_URI=${{ secrets.MONGO_URI }}
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            EOF
            docker stop flask-container || true
            docker rm flask-container || true
            docker build -t flask-app:v1 .
            docker images
            docker run -d \
              --name flask-container \
              --env-file .env \
              -p 5000:5000 \
              flask-app:v1
            curl -fsS http://localhost:5000
            docker ps
            EOF
          "